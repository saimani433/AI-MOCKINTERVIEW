name: Deploy and Live E2E Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build, Deploy & Live Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend Application
        run: |
          cd frontend
          npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/dist
          branch: gh-pages

      - name: Wait for Deployment Completion
        run: sleep 10

      - name: Verify Live Deployment URL
        run: |
          curl -I --fail https://${{ github.repository_owner }}.github.io/ai-mock-interview || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Test Dependencies
        run: |
          cd e2e-tests
          python -m pip install --upgrade pip
          pip install selenium openpyxl requests

      - name: Run Headless Selenium Live Tests
        env:
          BASE_URL: https://${{ github.repository_owner }}.github.io/ai-mock-interview
        run: |
          cd e2e-tests
          python run_live_tests.py

      - name: Upload Automation Report Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-automation-reports
          path: |
            e2e-tests/Test Results/Excel/
            e2e-tests/Test Results/HTML/
            e2e-tests/Test Results/Screenshots/
            e2e-tests/Test Results/Logs/
            e2e-tests/Test Results/Summary/

      - name: Publish GitHub Job Summary
        if: always()
        run: |
          cat "e2e-tests/Test Results/Summary/summary.md" >> $GITHUB_STEP_SUMMARY
